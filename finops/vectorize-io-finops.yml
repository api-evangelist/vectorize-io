meters:
- name: subscription_tier
  description: Monthly subscription fee for the selected plan (Starter, Professional).
  unit: subscription
  aggregation: max
  dimensions:
  - organization
  - plan
- name: pipelines
  description: Number of active RAG pipelines against the tier allowance.
  unit: pipelines
  aggregation: max
  dimensions:
  - organization
  - pipeline
- name: pages_processed
  description: Document pages ingested / extracted per month, against the tier allowance.
  unit: pages
  aggregation: sum
  dimensions:
  - organization
  - pipeline
- name: retrieval_requests
  description: Retrieval (vector search) queries issued against pipelines.
  unit: requests
  aggregation: sum
  dimensions:
  - organization
  - pipeline
- name: extraction_jobs
  description: Iris document extraction jobs run via the Extraction API.
  unit: jobs
  aggregation: sum
  dimensions:
  - organization
  - pipeline
- name: deep_research_runs
  description: Deep research runs grounded in a pipeline's vector index.
  unit: jobs
  aggregation: sum
  dimensions:
  - organization
  - pipeline
- name: vision_pages
  description: Pages routed through vision-model processing for complex PDFs.
  unit: pages
  aggregation: sum
  dimensions:
  - organization
  - pipeline
principles:
- name: Visibility
  description: Track pages processed and pipeline count per month against tier allowances to anticipate the next tier or overage.
- name: Allocation
  description: Tag pipelines and access tokens per workload / team and map to internal cost centers.
- name: Optimization
  description: Right-size pipeline count and update frequency; tune chunkSize and reranking to control retrieval cost; reserve vision-model PDF processing for documents that need it.
- name: Accountability
  description: Assign owners per pipeline; review page-processing burn and subscription tier monthly against budget.
