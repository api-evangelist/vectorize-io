serviceCategory: AI and Machine Learning
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Vectorize
  ServiceCategory: AI and Machine Learning
  ProviderName: Vectorize
  PublisherName: Vectorize
  InvoiceIssuerName: Vectorize
