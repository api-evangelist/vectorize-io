description: >-
  FinOps view of Vectorize RAG platform spend. Vectorize bills primarily through
  subscription tiers (Free / Starter / Professional / Enterprise) keyed to the
  number of RAG pipelines and monthly pages processed, plus the built-in vector
  database, vision-model PDF processing, retrieval queries, Iris extraction, and
  deep research. Cost drivers are page-processing volume (ingestion / extraction),
  number and update frequency of pipelines, and retrieval query volume.
notes: >-
  Subscription prices and page allowances are subject to change; verify against
  the Vectorize pricing page during reconciliation. The API is in Beta.
sources:
- https://vectorize.io/
- https://platform.vectorize.io
- https://docs.vectorize.io
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
