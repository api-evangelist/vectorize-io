  - url: openapi/vectorize-io-openapi.yml
    type: OpenAPI
  - url: collections/vectorize-io.postman_collection.json
    type: PostmanCollection
  description: Per-pipeline retrieval endpoint that vectorizes the input question, runs
    a k-ANN search against the pipeline's vector index, applies optional reranking and
