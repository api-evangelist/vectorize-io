aid: vectorize-io
url: https://raw.githubusercontent.com/api-evangelist/vectorize-io/refs/heads/main/apis.yml
name: Vectorize
kind: company
description: Vectorize is a RAG (retrieval-augmented generation) pipeline platform that
  ingests unstructured data, chunks and embeds it, and serves low-latency retrieval
  against a managed vector database. The Vectorize API lets developers create, start,
  and stop RAG pipelines, run retrieval, manage source / destination / AI-platform
  connectors, upload files, extract documents with Iris, and run deep research.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- AI
- RAG
- Vectorization
- Embeddings
- Retrieval
- Vector Database
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
apis:
- aid: vectorize-io:vectorize-pipelines-api
  name: Vectorize Pipelines API
  tags:
  - RAG
  - Pipelines
  - Ingest
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
