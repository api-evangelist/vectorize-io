sources:
  - url: https://docs.vectorize.io/reference/api/api-getting-started/
    type: APIReference
    note: Vectorize API (Beta); Bearer access token; organization-scoped REST paths.
  - url: https://github.com/vectorize-io/vectorize-clients
    type: OpenAPI
    note: Official client repo; vectorize_api.json is the OpenAPI 3.0 source (servers https://api.vectorize.io/v1, bearerAuth).
  - url: https://docs.vectorize.io/build-deploy/data-pipelines/retrieval-endpoint/
    type: Documentation
    note: Per-pipeline retrieval endpoint; vectorizes the question and runs k-ANN search with optional rerank.
  - url: https://docs.vectorize.io/build-deploy/extract-information/understanding-iris/
    type: Documentation
    note: Vectorize Iris document extraction; start job then poll for result.
  - url: https://docs.vectorize.io/build-deploy/data-pipelines/openai-compatible-endpoint/
    type: Documentation
    note: Separate OpenAI-compatible chat completions endpoint (Beta) supports streaming via OpenAI client semantics; not part of the core REST API modeled here.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No documented WebSocket or SSE surface exists on the core Vectorize REST
    API. Long-running extraction and deep research use a start-then-poll
    request/response pattern over REST, which is not a streaming transport, so
    no AsyncAPI document was authored. The OpenAPI document at
    openapi/vectorize-io-openapi.yml models the documented REST surface.
