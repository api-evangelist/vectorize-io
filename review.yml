aid: vectorize-io
name: Vectorize
review:
  question: Does Vectorize expose a documented public WebSocket or streaming API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    Per API Evangelist scope, HTTP Server-Sent Events (SSE) is in-scope for
    AsyncAPI modeling and WebSocket is in-scope. The Vectorize API
    (https://api.vectorize.io/v1) is a synchronous REST API. Its long-running
    operations - Iris extraction and deep research - are asynchronous but use a
    request/poll pattern (start returns an id; a GET result endpoint returns
    ready=true with data when finished), not a streaming transport. No SSE or
    WebSocket surface is documented, so no AsyncAPI document was authored.
findings:
  summary: |
    Vectorize does not publish a documented public WebSocket or SSE streaming
    API. The Vectorize API is an organization-scoped REST API under
    https://api.vectorize.io/v1 authenticated with a Bearer access token
    (bearerAuth, JWT). All documented operations are HTTPS REST: pipeline CRUD
    and lifecycle (create / start / stop / delete), per-pipeline retrieval,
    connector CRUD (sources / destinations / AI platforms), file upload via
    pre-signed URL, Iris extraction, deep research, plus events, metrics, and
    workspaces. Extraction and deep research are long-running and use a
    start-then-poll pattern rather than a streaming transport. Note: Vectorize
    separately offers an OpenAI-compatible chat completions endpoint (Beta) that
    supports SSE-style streaming through OpenAI client semantics, but that is the
    OpenAI-compatible surface, not the core Vectorize REST API modeled here.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.vectorize.io/v1
      documented: true
    - protocol: SSE
      scheme: https
      documented: false
      note: The core Vectorize API does not expose documented Server-Sent Events; long-running jobs use start-then-poll. An OpenAI-compatible chat endpoint (separate, Beta) can stream via OpenAI client semantics.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented for the Vectorize API as of the review date.
  authentication:
    scheme: bearer
    bearerFormat: JWT
    note: Bearer access token, organization-scoped paths under /org/{organizationId}.
  endpointsConfirmedRest:
